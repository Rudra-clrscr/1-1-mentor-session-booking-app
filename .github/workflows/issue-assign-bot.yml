name: Issue Assignment & Management Bot

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:

jobs:
  handle-assignment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Process Issue Assignment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const issue_number = context.payload.issue?.number;

            if (!issue_number) {
              console.log("No issue context found for this event.");
              return;
            }

            try {
              // 1. Fetch current status of the issue
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number
              });

              // If the issue is already assigned, stop processing immediately
              if (issue.assignees && issue.assignees.length > 0) {
                console.log(`Issue #${issue_number} is already assigned to @${issue.assignees[0].login}. Skipping.`);
                return;
              }

              let targetUser = null;
              let reasonMessage = "";

              // 2. Determine who should be assigned based on the trigger event
              if (context.eventName === 'issues') {
                // Assign the creator of the issue right away if opened/edited and unassigned
                targetUser = issue.user.login;
                reasonMessage = `👋 @${targetUser}, you have been automatically assigned to this issue as the creator. Good luck! 🚀`;
              } else if (context.eventName === 'issue_comment') {
                // Assign the first person who interacts by commenting
                targetUser = context.payload.comment.user.login;
                reasonMessage = `✅ @${targetUser}, as the first commenter on this unassigned issue, you have been automatically assigned. Happy coding! 🚀`;
              } else if (context.eventName === 'workflow_dispatch') {
                console.log("Manual trigger active. Automated user tracking requires context events.");
                return;
              }

              if (targetUser) {
                // 3. Perform assignment
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number,
                  assignees: [targetUser]
                });

                // 4. Leave an announcement comment
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: reasonMessage
                });

                console.log(`Successfully assigned @${targetUser} to Issue #${issue_number}`);
              }

            } catch (error) {
              core.setFailed(`Failed to automatically assign issue: ${error.message}`);
            }