name: Issue Assignment & Management Bot

on:
  issues:
    types: [opened, edited]
  issue_comment:
    types: [created]
  workflow_dispatch:
    inputs:
      issue_number:
        description: 'Issue number to manually assign (Only needed for manual runs)'
        required: false
        type: string
      assignee_username:
        description: 'GitHub username to assign (Defaults to repository owner if blank)'
        required: false
        type: string

jobs:
  handle-assignment:
    runs-on: ubuntu-latest
    permissions:
      issues: write
    steps:
      - name: Process Issue Assignment
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            
            // 1. Resolve the issue number depending on how it was triggered
            let issue_number = context.payload.issue?.number;
            
            if (context.eventName === 'workflow_dispatch') {
              const inputNum = '${{ inputs.issue_number }}'.trim();
              if (inputNum) {
                issue_number = parseInt(inputNum, 10);
              }
            }

            if (!issue_number || isNaN(issue_number)) {
              core.setFailed("Could not resolve a valid issue number. For manual runs, please provide an issue number input.");
              return;
            }

            try {
              // 2. Fetch current status of the target issue
              const { data: issue } = await github.rest.issues.get({
                owner,
                repo,
                issue_number
              });

              // If the issue is already assigned, stop processing immediately
              if (issue.assignees && issue.assignees.length > 0) {
                console.log(`Issue #${issue_number} is already assigned to @${issue.assignees[0].login}. Skipping.`);
                return;
              }

              let targetUser = null;
              let reasonMessage = "";

              // 3. Determine who should be assigned based on the trigger event
              if (context.eventName === 'issues') {
                targetUser = issue.user.login;
                reasonMessage = `👋 @${targetUser}, you have been automatically assigned to this issue as the creator. Good luck! 🚀`;
              } else if (context.eventName === 'issue_comment') {
                targetUser = context.payload.comment.user.login;
                reasonMessage = `✅ @${targetUser}, as the first commenter on this unassigned issue, you have been automatically assigned. Happy coding! 🚀`;
              } else if (context.eventName === 'workflow_dispatch') {
                // For manual dispatch runs, use input username or default to repo owner
                const inputUser = '${{ inputs.assignee_username }}'.trim();
                targetUser = inputUser || owner;
                reasonMessage = `⚡ @${targetUser} has been manually assigned to this issue via administrative trigger.`;
              }

              if (targetUser) {
                // 4. Perform assignment
                await github.rest.issues.addAssignees({
                  owner,
                  repo,
                  issue_number,
                  assignees: [targetUser]
                });

                // 5. Leave an announcement comment
                await github.rest.issues.createComment({
                  owner,
                  repo,
                  issue_number,
                  body: reasonMessage
                });

                console.log(`Successfully assigned @${targetUser} to Issue #${issue_number}`);
              }

            } catch (error) {
              core.setFailed(`Failed to automatically assign issue: ${error.message}`);
            }